parameters:
- name: location
  type: string
  default: 'centralindia'
- name: subscriptionId
  type: string
  default: '0b3918b5-4679-4783-9724-f17bc3d199b8'
- name: environment
  type: string
  default: 'dev'
  values:
    - 'dev'
    - 'uat'
    - 'prod'
    - 'test'
- name: conditiondeploybicep
  type: boolean
  default: true
- name: webAppName
  type: string
  default: 'Enterprise-DemandGeneration-SEA-DB-CP'
- name: appServiceName
  type: string
  default: 'dotnet-connectpluscpbackend'
- name: TemplateFolder
  type: string
  default: 'microsoft.sql/config'


stages:
# Stage for Validating template of Bicep  
- stage: ValidateTemplateStorage
  displayName: Build and Validate Bicep for Storage
  variables:
    _ResourceGroupName: '${{ parameters.webAppName }}-${{ upper(parameters.environment) }}'
    vmImageNameVaidate: 'windows-latest'
    vmImageName: 'windows-latest'
    resourceGroupName: ${{ parameters.webAppName }}-${{ upper(parameters.environment) }}
    environmentName: ${{ parameters.webAppName }}-${{ upper(parameters.environment) }}
    serviceConnection: 'Enterprise-DemandGeneration-SEA-DB-CP-${{ upper(parameters.environment) }}'

  pool:
      vmImage: $(vmImageNameVaidate)
  jobs:
  - job: ValidateTemplate
    displayName: 'Validate template'
    steps:
      - task: AzureCLI@2
        enabled: true
        displayName: Validate Bicep Template
        condition: succeededOrFailed()
        inputs:
          azureSubscription: ${{ variables['_ResourceGroupName'] }}
          scriptType: pscore
          workingDirectory: ${{ parameters.TemplateFolder }}
          scriptLocation: inlineScript
          inlineScript: |
            az deployment group validate --verbose `
              --resource-group ${{ variables['_ResourceGroupName'] }} `
              --template-file .\storage-deployment.json `
              --parameters .\${{ parameters.environment }}-storage-deployment.parameters.json `
              --debug

 # Stage for Publishing Bicep Template 
- stage: PublishTemplateStorage
  displayName: Publish templates for Storage
  dependsOn:
  - ValidateTemplateStorage
  jobs:
  - job: PublishArtifactsIfNoFailures
    displayName: 'Publish artifacts'
    steps:
    - task: CopyFiles@2
      displayName: 'Copy Files to: $(build.artifactstagingdirectory)'
      inputs:
        SourceFolder: '$(build.SourcesDirectory)/${{ parameters.TemplateFolder }}'
        Contents: |
              **/*.json
              **/*.bicep
              **/*.bicepparam
        TargetFolder: '$(build.artifactstagingdirectory)'
        CleanTargetFolder: true
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifact: dropstorage'
      inputs:
        pathToPublish: $(build.artifactstagingdirectory)
        artifactName: 'dropstorage'
        publishLocation: 'Container'

# Stage for Deploying Bicep Template for Web App service
- stage: DeployStorage
  displayName: Deploy Storage (${{ parameters.environment }})
  jobs:
    - job: webStorage
      displayName: Deploy Storage

      steps:
        - checkout: self

        - task: DownloadBuildArtifacts@0
          displayName: Download Artifact
          inputs:
            buildType: current
            downloadType: single
            artifactName: dropstorage
            downloadPath: $(Pipeline.Workspace)

        - task: AzureResourceManagerTemplateDeployment@3
          displayName: Deploy Storage Account
          inputs:
            deploymentScope: 'Resource Group'
            azureResourceManagerConnection: 'Enterprise-DemandGeneration-SEA-DB-CP-${{ upper(parameters.environment) }}'
            resourceGroupName: '${{ parameters.webAppName }}-${{ upper(parameters.environment) }}'
            location: ${{ parameters.location }}
            csmFile: '$(Pipeline.Workspace)/dropstorage/storage-deployment.bicep'
            csmParametersFile: '$(Pipeline.Workspace)/dropstorage/${{ parameters.environment }}-storage-deployment.parameters.json'
            deploymentOutputs: 'armOutputs'

        - task: Bash@3
          displayName: Print Outputs
          inputs:
            targetType: inline
            script: |
              echo "ARM Output:"
              echo '$(armOutputs)'