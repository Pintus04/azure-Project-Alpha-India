parameters:
- name: location
  type: string
  default: 'centralindia'

- name: subscriptionId
  type: string
  default: '0b3918b5-4679-4783-9724-f17bc3d199b8'

- name: environment
  type: string
  default: 'dev'
  values: 
    - 'dev'
    - 'uat'
    - 'prod'
    - 'test'

- name: appName
  type: string
  default: 'Enterprise-DemandGeneration-SEA-DB'

- name: logicAppName
  type: string
  default: 'sf-login-scheduler'

stages:
- stage: DeleteScheduler
  displayName: Delete Logic App Scheduler
  variables:
    _ResourceGroupName: '${{ parameters.appName }}-${{ upper(parameters.environment) }}'
    vmImageNameDelete: 'ubuntu-latest'
  jobs:
  - job: DeleteSchedulerJob
    displayName: Delete Logic App Scheduler
    pool:
      vmImage: $(vmImageNameDelete)
    steps:
      - task: AzureCLI@2
        displayName: Delete Logic App Scheduler
        inputs:
          azureSubscription: ${{ variables._ResourceGroupName }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            echo "Deleting Logic App: ${{ parameters.logicAppName }}"
            az resource delete \
              --name ${{ parameters.logicAppName }} \
              --resource-group ${{ variables._ResourceGroupName }} \
              --resource-type "Microsoft.Logic/workflows" \
              --verbose
             
             echo "✅ Successfully deleted Logic App '${{ parameters.logicAppName }}' from '${{ variables._ResourceGroupName }}'."
