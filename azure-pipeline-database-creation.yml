parameters:
- name: location
  type: string
  default: 'centralindia'
- name: subscriptionId
  type: string
  default: '7831e4eb-265f-48c0-b2ca-f7370a400a35'
- name: environment
  type: string
  default: 'dev'
  values: 
    - 'dev'
    - 'uat'
    - 'prod'
    - 'test'
- name: conditiondeploybicep
  type: boolean
  default: true
- name: appName
  type: string
  default: 'Project-Alpha-India'
- name: TemplateFolder
  type: string
  default: 'microsoft.sql/config'


stages:
# Stage for Validating template of Bicep  
- stage: ValidateTemplateSQL
  displayName: Build and Validate Bicep for SQL Database
  variables:
    _ResourceGroupName: '${{ parameters.appName }}-${{ upper(parameters.environment) }}'
    vmImageNameVaidate: 'windows-latest'
    vmImageName: 'windows-latest'
    resourceGroupName: ${{ parameters.appName }}-${{ upper(parameters.environment) }}
    environmentName: ${{ parameters.appName }}-${{ upper(parameters.environment) }}
  pool:
      vmImage: $(vmImageNameVaidate)
  jobs:
  - job: ValidateTemplateSQL
    displayName: 'Validate template'
    steps:
      - task: AzureCLI@2
        enabled: true
        displayName: Validate Bicep Template
        condition: succeededOrFailed()
        inputs:
          azureSubscription: ${{ variables['_ResourceGroupName'] }}
          scriptType: pscore
          workingDirectory: ${{ parameters.TemplateFolder }}
          scriptLocation: inlineScript
          inlineScript: |
            az deployment group validate --verbose `
              --resource-group ${{ variables['_ResourceGroupName'] }} `
              --template-file .\azuredeploy.json `
              --parameters .\${{ parameters.environment }}-azuredeploy.parameters.json `
              --debug

 # Stage for Publishing Bicep Template 
- stage: PublishTemplateSQL
  displayName: Publish templates for SQL Database
  dependsOn:
  - ValidateTemplateSQL
  jobs:
  - job: PublishArtifactsIfNoFailures
    displayName: 'Publish artifacts'
    steps:
    - task: CopyFiles@2
      displayName: 'Copy Files to: $(build.artifactstagingdirectory)'
      inputs:
        SourceFolder: '$(build.SourcesDirectory)/${{ parameters.TemplateFolder }}'
        Contents: |
              **/*.json
              **/*.bicep
              **/*.bicepparam
        TargetFolder: '$(build.artifactstagingdirectory)'
        CleanTargetFolder: true
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifact: dropstorage'
      inputs:
        pathToPublish: $(build.artifactstagingdirectory)
        artifactName: 'dropsql'
        publishLocation: 'Container'

