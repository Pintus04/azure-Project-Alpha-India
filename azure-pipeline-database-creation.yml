- stage: DepoyBicepTemplateSQL
  displayName: Deploying Bicep Template for SQL Database
  variables:
    _ResourceGroupName: '${{ parameters.appName }}-${{ upper(parameters.environment) }}'
  jobs:
    - job: sqlDatabase
      displayName: Deploying Sql Server Template
      pool:
        vmImage: windows-latest
      steps:
        - checkout: self

        - task: DownloadBuildArtifacts@0
          displayName: 'Download artifact'
          inputs:
            buildType: 'current'
            downloadType: 'single'
            artifactName: 'dropsql'
            downloadPath: '$(Pipeline.Workspace)'

        - task: AzureResourceManagerTemplateDeployment@3
          displayName: 'SQL Server Bicep Deployment'
          inputs:
            deploymentScope: Resource Group
            azureResourceManagerConnection: ${{ variables._ResourceGroupName }}
            subscriptionId: ${{ parameters.subscriptionId }}
            action: Create Or Update Resource Group
            resourceGroupName: ${{ variables._ResourceGroupName }}
            location: ${{ parameters.location }}
            templateLocation: Linked artifact
            csmFile: '$(Pipeline.Workspace)/dropsql/azuredeploy.bicep'
            csmParametersFile: '$(Pipeline.Workspace)/dropsql/${{ parameters.environment }}-azuredeploy.parameters.json'
