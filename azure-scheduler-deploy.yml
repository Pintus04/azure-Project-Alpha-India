parameters:
- name: location
  type: string
  default: 'centralindia'

- name: subscriptionId
  type: string
  default: '7831e4eb-265f-48c0-b2ca-f7370a400a35'   # ✅ your real subscription ID

- name: environment
  type: string
  default: 'prod'
  values:
    - 'dev'
    - 'uat'
    - 'prod'
    - 'test'

- name: appName
  type: string
  default: 'Project-Alpha-India'

- name: TemplateFolder
  type: string
  default: 'azure-salesforce-login-scheduler'

# List of scheduler parameter files for each Salesforce job
- name: schedulerJobs
  type: object
  default:
    - name: distributors-sync
      file: 'prod-job1-distributors.parameters.json'
    - name: retailers-sync
      file: 'prod-job2-retailers-sync.parameters.json'
    - name: farmers-sync
      file: 'prod-job3-farmers-sync.parameters.json'
    - name: retailers-push
      file: 'prod-job4-retailers-push.parameters.json'
    - name: farmers-push
      file: 'prod-job5-farmers-push.parameters.json'
    - name: cropAcreage-push
      file: 'prod-job6-cropAcreage-push.parameters.json'
    - name: send-fas-sqlServerName
      file: 'prod-job7-sendFAS-SMS.parameters.json'

# -------------------
# Stage 1: Validate Scheduler Templates
# -------------------
stages:
- stage: ValidateSchedulerTemplate
  displayName: "Validate All Scheduler Templates"
  variables:
    _ResourceGroupName: '${{ parameters.appName }}-${{ upper(parameters.environment) }}'
  pool:
    vmImage: ubuntu-latest

  jobs:
  - job: ValidateAllSchedulers
    displayName: "Validate Scheduler Bicep Templates"
    steps:
      - checkout: self

      # Validate each scheduler job template
      - ${{ each job in parameters.schedulerJobs }}:
        - task: AzureCLI@2
          displayName: ${{ format('Validate Logic App - {0}', job.name) }}
          inputs:
            azureSubscription: 'Enterprise-DemandGeneration-SEA-DB-PROD'   # ✅ your actual Azure DevOps Service Connection Name
            scriptType: bash
            workingDirectory: ${{ parameters.TemplateFolder }}
            scriptLocation: inlineScript
            inlineScript: |
              echo "🔍 Validating scheduler template for $(job_name) ..."
              az deployment group validate \
                --resource-group $(resource_group) \
                --template-file jobScheduler.bicep \
                --parameters $(job_file) \
                --verbose
              echo "✅ Validation successful for $(job_name)"
          env:
            job_name: ${{ job.name }}
            job_file: ${{ job.file }}
            resource_group: ${{ parameters.appName }}-${{ upper(parameters.environment) }}


# -------------------
# Stage 2: Publish Scheduler Artifacts
# -------------------
- stage: PublishSchedulerTemplate
  displayName: "Publish Scheduler Bicep Template"
  dependsOn: ValidateSchedulerTemplate
  jobs:
  - job: PublishArtifacts
    displayName: "Publish Scheduler Artifacts"
    steps:
      - task: CopyFiles@2
        displayName: "Copy Scheduler Files to Artifact Staging"
        inputs:
          SourceFolder: '$(Build.SourcesDirectory)/${{ parameters.TemplateFolder }}'
          Contents: |
            **/*.json
            **/*.bicep
          TargetFolder: '$(Build.ArtifactStagingDirectory)'
          CleanTargetFolder: true

      - task: PublishBuildArtifacts@1
        displayName: "Publish Artifact: dropscheduler"
        inputs:
          pathToPublish: '$(Build.ArtifactStagingDirectory)'
          artifactName: 'dropscheduler'
          publishLocation: 'Container'


# -------------------
# Stage 3: Deploy All Logic App Schedulers
# -------------------
- stage: DeployAllSalesforceSchedulers
