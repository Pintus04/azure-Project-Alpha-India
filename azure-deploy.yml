          #         --parameters @$(System.ArtifactsDirectory)/drop/azuredeploy.parameters.json \
          #         --parameters location= ${{ parameters.location }}
          - task: CmdLine@2
            enabled: true
            displayName: Checking parameters
            inputs:
             script: |
              echo  '${{ parameters.subscriptionId }}'
              echo  '${{ variables._ResourceGroupName }}'
              echo  '${{ parameters.location }}'
              echo  $(Agent.artifactstagingdirectory)\drop\azuredeploy.json
              echo  $(Pipeline.Workspace)\drop\azuredeploy.json
              echo  '$(Agent.artifactstagingdirectory)\drop\azuredeploy.json'
