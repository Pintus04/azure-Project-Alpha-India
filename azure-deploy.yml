parameters:
- name: appName
  type: string  
- name: subscriptionId
  type: string
- name: environment
  type: string
  default: dev
  values:
  - poc
  - dev
  - prod
- name: TemplateFolder
  type: string
  default: 'mircrosoft.sql/config'
- name: condition
  default: true
- name: location
  type: string
  default: 'East US'



stages:
- stage: ${{ parameters.environment }}
  displayName: Deploy to ${{ upper(parameters.environment) }}
  condition: ${{ parameters.condition }}
  pool:
    vmImage: 'windows-latest'
    #vmImage: 'ubuntu-latest'
  variables:
    _EnvironmentUpper: ${{ upper(parameters.environment) }}
    _ResourceGroupName: '${{ parameters.appName }}-${{ upper(parameters.environment) }}'

  jobs:
  - deployment: SqlDatabaseServer
    displayName: "Deploy SqlDatabaseServer ARM"

    environment: 'Enterprise-DemandGeneration-SEA-DB-DEV'  # or use _ResourceGroupName if you prefer

    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - task: DownloadBuildArtifacts@0
            displayName: 'Download artifact'
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'
