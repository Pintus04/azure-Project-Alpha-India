          - task: PowerShell@2
            displayName: 'Clean SQL Script and Deploy'
            inputs:
              targetType: 'inline'
              script: |
                $sqlFile = "$(Pipeline.Workspace)\drop\ConnectPlus_DatabaseScript.sql"
                $cleanedSql = Get-Content $sqlFile | Where-Object { $_ -notmatch '^\s*USE\s' }
                $cleanedSql | Set-Content $sqlFile

                Write-Host "Cleaned SQL script. Now executing..."
                Invoke-Sqlcmd `
                  -InputFile $sqlFile `
                  -ServerInstance "phazd1856sqlserver.database.windows.net" `
                  -Database "devsqldatabase" `
                  -Username "administratorLogin" `
                  -Password "Admin@8874"